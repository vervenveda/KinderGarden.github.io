<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kindergarten Cloud Portal 🌈</title>
<style>
  :root{
    --home-bg:linear-gradient(135deg,#fff8e7,#ffe9f5,#e8faff);
    --font-main:"Comic Sans MS","Chalkboard SE",sans-serif;
    --accent:#ffb347;
  }
  body{
    margin:0;
    font-family:var(--font-main);
    background:var(--home-bg);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
  }
  h1{
    text-align:center;
    font-size:clamp(1.8rem,4vw,3rem);
    color:#ff4081;
    text-shadow:2px 2px #fff;
    margin:20px 10px 10px;
  }
  h2{
    text-align:center;
    font-size:clamp(1.2rem,3vw,2rem);
    color:#444;
    margin:8px;
  }

  /* Weekly grid */
  #weeks{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:12px;
    width:90%;
    max-width:900px;
    margin:0 auto 20px;
  }
  #weeks button{
    background:#fff59d;
    border:none;
    border-radius:16px;
    padding:12px 8px;
    font-size:clamp(0.9rem,2.5vw,1.1rem);
    cursor:pointer;
    box-shadow:0 4px 6px rgba(0,0,0,0.1);
    transition:transform .15s;
  }
  #weeks button:hover{transform:translateY(-4px);}
  #weeks button:active{transform:scale(.97);}

  /* Portal activity buttons */
  .activities{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin:20px 0;
  }
  .activities button{
    font-size:clamp(1rem,2.6vw,1.3rem);
    border:none;
    border-radius:18px;
    padding:14px 22px;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,.15);
    color:#fff;
    transition:transform .15s;
  }
  .activities button:active{transform:scale(.95);}
  .traceBtn{background:#f6c90e;}
  .artBtn{background:#6bb8ff;}
  .readBtn{background:#ffb347;}
  .pianoBtn{background:#8e7dff;}
  .emotionBtn{background:#ffafaf;}

  /* Fullscreen panels */
  .panel{
    position:fixed;inset:0;
    display:none;flex-direction:column;
    background:#fff;
    z-index:50;
    overflow:auto;
  }
  .panel.show{display:flex;animation:fadeIn .4s;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .closeBtn{
    align-self:flex-end;
    margin:10px 20px 0 0;
    padding:8px 14px;
    font-size:1rem;
    border:none;border-radius:8px;
    background:#444;color:#fff;
  }

  /* --- Tracing Garden --- */
  #tracePanel{background:linear-gradient(180deg,#dff9fb,#f6e58d);}
  #traceCanvas{
    border:3px solid #22a6b3;border-radius:14px;background:#fff;
    touch-action:none;
    max-width:90vw;max-height:70vh;margin:auto;
  }
  #garden{
    display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
    margin:10px auto;max-width:620px;
  }
  .tile{
    width:70px;height:70px;background:#f9ca24;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8em;color:#2c3e50;cursor:pointer;
    box-shadow:2px 4px 6px rgba(0,0,0,.15);
    transition:transform .2s;
  }
  .tile:hover{transform:scale(1.1);}
  #traceButtons{display:flex;justify-content:center;gap:10px;margin:10px;}
  #traceButtons button{
    background:#22a6b3;color:#fff;border:none;border-radius:8px;
    padding:10px 18px;font-size:1rem;cursor:pointer;
  }

  /* --- Art Lab --- */
  #artPanel{background:#CCE3FF;}
  #toolbar{
    display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
    background:#fff;padding:10px;border-bottom:2px solid #ccc;
  }
  #toolbar button{
    padding:8px 12px;border:none;border-radius:8px;cursor:pointer;
    background:#eee;
  }
  #toolbar button:hover{background:#ddd;}
  #colors{display:flex;justify-content:center;flex-wrap:wrap;margin:6px;}
  .color-btn{
    width:28px;height:28px;border-radius:50%;border:2px solid #333;
    margin:2px;cursor:pointer;
  }
  #canvas{border:3px solid #333;border-radius:12px;margin:12px auto;
    display:block;background:#fff;box-shadow:0 5px 15px rgba(0,0,0,.1);
    touch-action:none;max-width:95vw;}
  #gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:10px;}
  .thumb{width:80px;height:60px;border:2px solid #999;border-radius:8px;object-fit:cover;cursor:pointer;}
  #stickersPanel{display:none;margin:auto;padding:6px;background:#fff;width:fit-content;border-radius:8px;border:1px solid #ccc;}
  .sticker{font-size:26px;cursor:grab;margin:3px;}
  @media(max-width:700px){
    #toolbar{flex-direction:column;align-items:center;}
    .tile{width:60px;height:60px;font-size:1.4em;}
  }
</style>
</head>
<body>

<h1>🌈 Kindergarten Cloud Portal</h1>
<h2>Choose Your Weekly Adventure!</h2>

<!-- Weekly Lessons Grid -->
<div id="weeks"></div>

<!-- Play & Learn Activities -->
<div class="activities">
  <button class="traceBtn" onclick="openPanel('tracePanel')">✏️ Tracing Garden</button>
  <button class="artBtn" onclick="openPanel('artPanel')">🎨 Art Lab</button>
  <button class="readBtn" onclick="alert('Reading Room in Part 2')">📖 Reading Room</button>
  <button class="pianoBtn" onclick="alert('Piano in Part 2')">🎵 Piano</button>
  <button class="emotionBtn" onclick="alert('Emotion Lab in Part 2')">💛 Emotion Lab</button>
</div>

<!-- ===================== PANELS ===================== -->

<!-- ✏️ Tracing Garden -->
<div class="panel" id="tracePanel">
  <button class="closeBtn" onclick="closePanel('tracePanel')">Close ✖</button>
  <h2>✏️ ABC’s & 123’s Tracing Garden 🌸</h2>
  <div id="garden"></div>
  <canvas id="traceCanvas" width="400" height="400"></canvas>
  <div id="traceButtons">
    <button id="nextLetter">Next ➡</button>
    <button onclick="closePanel('tracePanel')">Back</button>
  </div>
</div>

<!-- 🎨 Art Lab -->
<div class="panel" id="artPanel">
  <button class="closeBtn" onclick="closePanel('artPanel')">Close ✖</button>
  <h2>🎨 Pel™ — Personal Editing Lab (Pre-K)</h2>
  <div id="toolbar">
    <button onclick="setTool('brush')">🖌 Brush</button>
    <button onclick="setTool('eraser')">🩹 Eraser</button>
    <label>Size: <input type="range" id="brushSize" min="2" max="30" value="8"></label>
    <input type="color" id="colorPicker" title="Custom Color">
    <button onclick="clearCanvas()">🧹 Clear</button>
    <button onclick="toggleStickers()">🌟 Stickers</button>
    <button onclick="saveArtwork()">💾 Save</button>
  </div>
  <div id="colors"></div>
  <div id="stickersPanel">
    <span class="sticker">⭐</span><span class="sticker">🌸</span><span class="sticker">🌈</span>
    <span class="sticker">☀️</span><span class="sticker">❤️</span><span class="sticker">🎨</span>
  </div>
  <canvas id="canvas" width="800" height="500"></canvas>
  <div id="gallery"></div>
</div>

<script>
/* ========== HOME GRID ========== */
const weekList=[
"A – Alligator 🐊","B – Bear 🐻","C – Cat 🐱","D – Dog 🐶","E – Elephant 🐘","F – Fox 🦊","G – Giraffe 🦒",
"H – Hippo 🦛","I – Iguana 🦎","J – Jellyfish 🪼","K – Kangaroo 🦘","L – Lion 🦁","M – Monkey 🐒","N – Narwhal 🐋",
"O – Owl 🦉","P – Penguin 🐧","Q – Queen 👑","R – Rabbit 🐇","S – Snake 🐍","T – Tiger 🐯","U – Umbrella ☂️",
"V – Violin 🎻","W – Whale 🐋","X – X-ray 🩻","Y – Yak 🐃","Z – Zebra 🦓"];
const weeks=document.getElementById("weeks");
weekList.forEach((t,i)=>{
  const b=document.createElement("button");
  b.textContent=`Week ${i+1}: ${t}`;
  b.onclick=()=>alert(`${t} lesson coming soon!`);
  weeks.appendChild(b);
});

/* ========== PANEL CONTROL ========== */
function openPanel(id){document.getElementById(id).classList.add("show");}
function closePanel(id){document.getElementById(id).classList.remove("show");}

/* ========== TRACING GARDEN ========== */
const garden=document.getElementById("garden");
const traceCanvas=document.getElementById("traceCanvas");
const ctxT=traceCanvas.getContext("2d");
const nextBtn=document.getElementById("nextLetter");
const letters=[..."ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz","1","2","3","4","5","6","7","8","9","0"];
let currentIndex=0,drawing=false;
letters.forEach(ch=>{
  const div=document.createElement("div");
  div.className="tile";div.textContent=ch;
  div.onclick=()=>openTrace(ch);
  garden.appendChild(div);
});
function openTrace(ch){drawLetter(ch);speak(ch);}
function drawLetter(ch){
  ctxT.clearRect(0,0,traceCanvas.width,traceCanvas.height);
  ctxT.font=(window.innerWidth<500?"160px":"260px")+" Comic Sans MS";
  ctxT.fillStyle="rgba(180,180,180,0.3)";
  ctxT.textAlign="center";ctxT.textBaseline="middle";
  ctxT.fillText(ch,traceCanvas.width/2,traceCanvas.height/2);
}
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.9;speechSynthesis.speak(u);}catch(e){}}
traceCanvas.addEventListener("pointerdown",e=>{drawing=true;ctxT.strokeStyle="#6ab04c";ctxT.lineWidth=8;ctxT.lineCap="round";ctxT.beginPath();ctxT.moveTo(e.offsetX,e.offsetY);});
traceCanvas.addEventListener("pointermove",e=>{if(!drawing)return;ctxT.lineTo(e.offsetX,e.offsetY);ctxT.stroke();});
["pointerup","pointerleave"].forEach(ev=>traceCanvas.addEventListener(ev,()=>drawing=false));
nextBtn.onclick=()=>{currentIndex=(currentIndex+1)%letters.length;drawLetter(letters[currentIndex]);speak(letters[currentIndex]);};

/* ========== ART LAB ========== */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let painting=false,currentColor="#000",tool="brush",brushSize=8;
document.getElementById("brushSize").oninput=e=>brushSize=e.target.value;
document.getElementById("colorPicker").oninput=e=>currentColor=e.target.value;
function setTool(t){tool=t;}
function clearCanvas(){if(confirm("Clear your canvas?"))ctx.clearRect(0,0,canvas.width,canvas.height);}
function toggleStickers(){const p=document.getElementById("stickersPanel");p.style.display=p.style.display==="none"?"block":"none";}
canvas.addEventListener("mousedown",e=>{painting=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);});
canvas.addEventListener("mouseup",()=>painting=false);
canvas.addEventListener("mousemove",e=>{
  if(!painting)return;
  ctx.lineCap="round";
  if(tool==="eraser"){ctx.strokeStyle="#fff";ctx.lineWidth=parseInt(brushSize)+10;}
  else{ctx.strokeStyle=currentColor;ctx.lineWidth=brushSize;}
  ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();
});
document.querySelectorAll(".sticker").forEach(s=>{
  s.addEventListener("click",e=>{
    const emoji=e.target.textContent;
    ctx.font="40px Comic Sans MS";ctx.fillText(emoji,Math.random()*canvas.width,Math.random()*canvas.height);
  });
});
function saveArtwork(){
  const title=prompt("Title your artwork:")||"art";
  const imgData=canvas.toDataURL("image/png");
  const link=document.createElement("a");link.download=title+".png";link.href=imgData;link.click();
}
</script>
</body>
</html>

<script>
/* ===========================================================
   📖 READING ROOM
=========================================================== */
const stories={
  A:{title:"A – Alligator Adventure",text:"Alligator Annie loves apples! She chomps and munches by the river. Chomp for A!"},
  B:{title:"B – Bear’s Big Bounce",text:"Benny the bear bounced his blue ball by the bubbling brook. Bounce for B!"},
  C:{title:"C – Cat Coco’s Carrots",text:"Coco the cat clapped for her crunchy carrots. Clap for C!"},
  D:{title:"D – Dog Daisy Digs",text:"Daisy dug deep for dazzling daisies. Dig for D!"},
};
const readPanel=document.createElement("div");
readPanel.className="panel";readPanel.id="readPanel";
readPanel.innerHTML=`
  <button class="closeBtn" onclick="closePanel('readPanel')">Close ✖</button>
  <h2>📖 Reading Room</h2>
  <div id="storyBox" style="margin:auto;padding:20px;max-width:600px;text-align:center;background:#fff8e1;border-radius:16px;box-shadow:0 4px 10px rgba(0,0,0,.1);">
    <h3 id="storyTitle">Select a letter to read!</h3>
    <p id="storyText" style="font-size:1.2rem;color:#333;"></p>
    <button id="nextStory" style="background:#ffb347;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:1rem;margin-top:8px;">Next Story ➡️</button>
    <button id="playStory" style="background:#4facfe;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:1rem;margin-top:8px;">🔊 Read Aloud</button>
    <button id="toPiano" style="background:#8e7dff;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:1rem;margin-top:8px;">🎵 Play This Song on Piano</button>
  </div>`;
document.body.appendChild(readPanel);

document.querySelector(".readBtn").onclick=()=>openPanel('readPanel');

let storyKeys=Object.keys(stories),storyIndex=0;
function showStory(){
  const s=stories[storyKeys[storyIndex]];
  document.getElementById("storyTitle").textContent=s.title;
  document.getElementById("storyText").textContent=s.text;
}
document.getElementById("nextStory").onclick=()=>{storyIndex=(storyIndex+1)%storyKeys.length;showStory();};
document.getElementById("playStory").onclick=()=>{const s=document.getElementById("storyText").textContent;speak(s);};
document.getElementById("toPiano").onclick=()=>{closePanel('readPanel');openPanel('pianoPanel');};
showStory();

/* ===========================================================
   🎵 PIANO DELUXE
=========================================================== */
const pianoPanel=document.createElement("div");
pianoPanel.className="panel";pianoPanel.id="pianoPanel";
pianoPanel.style.background="linear-gradient(180deg,#6a5acd,#9370db)";
pianoPanel.innerHTML=`
  <button class="closeBtn" onclick="closePanel('pianoPanel')">Close ✖</button>
  <h2 style="color:#FFD700;text-shadow:2px 2px #333;">🎶 Pre-K Piano Deluxe 🎶</h2>
  <p style="color:#fff;">Click the rainbow keys! Record and playback your tune.</p>
  <select id="instrumentSelect">
    <option value="piano">🎹 Piano</option>
    <option value="xylophone">🔔 Xylophone</option>
    <option value="bells">🎶 Bells</option>
  </select>
  <div id="instrumentIcon" style="font-size:60px;margin:10px;">🎹</div>
  <div id="piano" style="display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin:10px auto;"></div>
  <div class="controls" style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;">
    <button class="record" style="background:#e74c3c;">⏺️ Record</button>
    <button class="stop" style="background:#f39c12;">⏹️ Stop</button>
    <button class="play" style="background:#2ecc71;">▶️ Play</button>
    <button class="beatToggle" style="background:#3498db;">🥁 Beat</button>
  </div>
  <div id="message" style="color:#fff;margin:10px;"></div>
  <audio id="beatAudio" src="https://actions.google.com/sounds/v1/drums/drum_loop.ogg" loop preload="auto"></audio>`;
document.body.appendChild(pianoPanel);

const NOTES=["C4","D4","E4","F4","G4","A4","B4","C5"];
const pianoDiv=pianoPanel.querySelector("#piano");
const freqMap={"C4":261.63,"D4":293.66,"E4":329.63,"F4":349.23,"G4":392,"A4":440,"B4":493.88,"C5":523.25};
let recording=[],isRecording=false,startTime,beatPlaying=false;
const beatAudio=pianoPanel.querySelector("#beatAudio");
function createKeys(){
  pianoDiv.innerHTML="";
  NOTES.forEach(note=>{
    const key=document.createElement("div");
    const label=note.replace(/[0-9]/g,"");
    key.textContent=label;
    key.style.width="70px";key.style.height="180px";
    key.style.borderRadius="20px";key.style.display="flex";key.style.alignItems="flex-end";
    key.style.justifyContent="center";key.style.margin="3px";key.style.cursor="pointer";
    key.style.fontWeight="bold";key.style.fontSize="24px";key.style.border="3px solid #FFD700";
    key.style.color="#fff";key.style.userSelect="none";
    const colors=["#FF4C4C","#FF9933","#FFD700","#32CD32","#1E90FF","#8A2BE2","#FF69B4","#FF4C4C"];
    key.style.background=colors[NOTES.indexOf(note)];
    key.onclick=()=>playNote(note);
    pianoDiv.appendChild(key);
  });
}
createKeys();
function playNote(note){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type="sine";osc.frequency.value=freqMap[note];
  gain.gain.setValueAtTime(0.6,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1);
  osc.connect(gain);gain.connect(ctx.destination);
  osc.start();osc.stop(ctx.currentTime+1.5);
  if(isRecording)recording.push({note,time:Date.now()-startTime});
}
function startRec(){recording=[];startTime=Date.now();isRecording=true;pianoPanel.querySelector("#message").textContent="🎤 Recording...";}
function stopRec(){isRecording=false;pianoPanel.querySelector("#message").textContent="⏹️ Stopped.";}
function playRec(){
  if(!recording.length)return;
  pianoPanel.querySelector("#message").textContent="▶️ Playing...";
  recording.forEach(ev=>setTimeout(()=>playNote(ev.note),ev.time));
}
function toggleBeat(){
  beatPlaying=!beatPlaying;
  if(beatPlaying){beatAudio.play().catch(()=>{});}else{beatAudio.pause();beatAudio.currentTime=0;}
}
pianoPanel.querySelector(".record").onclick=startRec;
pianoPanel.querySelector(".stop").onclick=stopRec;
pianoPanel.querySelector(".play").onclick=playRec;
pianoPanel.querySelector(".beatToggle").onclick=toggleBeat;

/* ===========================================================
   💛 EMOTION DETECTIVE
=========================================================== */
const emotionPanel=document.createElement("div");
emotionPanel.className="panel";emotionPanel.id="emotionPanel";
emotionPanel.innerHTML=`
  <button class="closeBtn" onclick="closePanel('emotionPanel')">Close ✖</button>
  <h2>💛 Emotion Detective – Creative Edition</h2>
  <p id="sentenceText" class="sentence-box" style="background:#fff;border-radius:20px;padding:10px 20px;display:inline-block;">Click “Next” to begin!</p>
  <div style="margin:10px;">
    <button id="playBtn">🔊 Say Sentence</button>
    <button id="nextBtn">➡️ Next</button>
    <button id="saveFace">💾 Save Drawing</button>
    <button id="teacherToggle">🎓 Teacher Mode</button>
  </div>
  <canvas id="faceCanvas" width="300" height="300" style="border:2px solid #333;border-radius:20px;background:#fff;"></canvas>
  <div id="teacherPanel" style="display:none;background:#fff7e6;border:1px solid #ffd580;border-radius:10px;padding:10px;width:80%;margin:10px auto;text-align:left;">
    <h3>🎓 Edit Emotion Sentences</h3>
    <textarea id="sentenceEditor" style="width:100%;height:100px;"></textarea><br>
    <button id="saveSentences">💾 Save</button>
  </div>`;
document.body.appendChild(emotionPanel);

document.querySelector(".emotionBtn").onclick=()=>openPanel('emotionPanel');

let defaultSentences=[
  "I lost my favorite toy.",
  "I got a big ice cream cone!",
  "My friend didn’t want to play with me.",
  "I’m going to the zoo today!",
  "I dropped my snack on the floor.",
  "It’s my birthday party!"
];
let sentences=JSON.parse(localStorage.getItem("teacherSentences")||"null")||defaultSentences;
let currentSentence="";

const fCanvas=emotionPanel.querySelector("#faceCanvas"),fCtx=fCanvas.getContext("2d");
function drawFace(){
  fCtx.clearRect(0,0,fCanvas.width,fCanvas.height);
  fCtx.fillStyle="#ffdbac";
  fCtx.beginPath();fCtx.arc(150,150,100,0,Math.PI*2);fCtx.fill();
  fCtx.fillStyle="#000";fCtx.beginPath();fCtx.arc(110,140,10,0,Math.PI*2);fCtx.arc(190,140,10,0,Math.PI*2);fCtx.fill();
}
drawFace();
fCanvas.addEventListener("mousedown",()=>drawing=true);
fCanvas.addEventListener("mouseup",()=>drawing=false);
fCanvas.addEventListener("mousemove",e=>{
  if(!drawing)return;
  fCtx.lineWidth=3;fCtx.strokeStyle="#000";
  fCtx.lineTo(e.offsetX,e.offsetY);fCtx.stroke();
  fCtx.beginPath();fCtx.moveTo(e.offsetX,e.offsetY);
});
document.getElementById("nextBtn").onclick=()=>{
  drawFace();
  currentSentence=sentences[Math.floor(Math.random()*sentences.length)];
  document.getElementById("sentenceText").textContent=currentSentence;
  speak(currentSentence);
};
document.getElementById("playBtn").onclick=()=>{if(currentSentence)speak(currentSentence);};
document.getElementById("saveFace").onclick=()=>{
  const link=document.createElement("a");
  link.download="emotion_art.png";
  link.href=fCanvas.toDataURL();
  link.click();
};
document.getElementById("teacherToggle").onclick=()=>{
  const p=document.getElementById("teacherPanel");
  p.style.display=p.style.display==="block"?"none":"block";
  document.getElementById("sentenceEditor").value=sentences.join("\n");
};
document.getElementById("saveSentences").onclick=()=>{
  const newS=document.getElementById("sentenceEditor").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(newS.length){sentences=newS;localStorage.setItem("teacherSentences",JSON.stringify(sentences));alert("Sentences saved!");}
};
</script>
