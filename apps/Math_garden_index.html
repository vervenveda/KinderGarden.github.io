<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌈 Happy Math Garden 🌈</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: "Comic Sans MS", system-ui, sans-serif;
    background: linear-gradient(#9be7ff, #fff);
    text-align: center;
  }

  header {
    background: #ff6f91;
    color: #fff;
    padding: 16px;
    font-size: 28px;
    text-shadow: 2px 2px #444;
  }

  #game {
    max-width: 800px;
    margin: auto;
    padding: 20px;
  }

  #question {
    font-size: 32px;
    margin: 20px 0;
  }

  #manipulatives {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    min-height: 120px;
  }

  .item {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    background: #ffcc4d;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    animation: pop 0.3s ease;
  }

  #answerZone {
    margin: 20px auto;
    padding: 20px;
    border: 4px dashed #4caf50;
    border-radius: 20px;
    min-height: 80px;
    font-size: 28px;
    transition: background 0.3s;
  }

  button {
    padding: 14px 26px;
    font-size: 20px;
    border: none;
    border-radius: 14px;
    background: #4caf50;
    color: white;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 3px 3px #444;
  }

  .confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    top: -10px;
    animation: fall 1.4s linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }

  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>

<body>
<header>🌈 Happy Math Garden 🌈</header>

<div id="game">
  <div id="question"></div>
  <div id="manipulatives"></div>
  <div id="answerZone">Drop apples here 🍎</div>
  <button onclick="submitAnswer()">✔️ Check</button>
  <div>🏆 Stickers: <span id="stickers">0</span></div>
</div>

<script>
/* -------------------------
   STATE
-------------------------- */
let state = JSON.parse(localStorage.getItem("mathGarden")) || {
  correct: 0,
  total: 0,
  level: 1,
  stickers: 0
};
  
  /* -------------------------
   CHALLENGE BANK (1–20)
-------------------------- */
const CHALLENGES = [

/* ===== COUNTING (20) ===== */
{ id:1,  type:"count", question:"Count the apples", answer:3, max:5, reward:3 },
{ id:2,  type:"count", question:"How many apples do you see?", answer:5, max:5, reward:3 },
{ id:3,  type:"count", question:"Count carefully!", answer:4, max:5, reward:3 },
{ id:4,  type:"count", question:"Count all the apples", answer:2, max:5, reward:2 },

{ id:5,  type:"count", question:"Count the apples", answer:6, max:10, reward:4 },
{ id:6,  type:"count", question:"How many apples are there?", answer:7, max:10, reward:4 },
{ id:7,  type:"count", question:"Count carefully!", answer:8, max:10, reward:4 },
{ id:8,  type:"count", question:"Count them all", answer:9, max:10, reward:4 },
{ id:9,  type:"count", question:"How many apples?", answer:10, max:10, reward:4 },

{ id:10, type:"count", question:"Count the apples", answer:11, max:20, reward:5 },
{ id:11, type:"count", question:"How many apples?", answer:12, max:20, reward:5 },
{ id:12, type:"count", question:"Count carefully!", answer:13, max:20, reward:5 },
{ id:13, type:"count", question:"Count all the apples", answer:14, max:20, reward:5 },
{ id:14, type:"count", question:"How many do you see?", answer:15, max:20, reward:5 },

{ id:15, type:"count", question:"Count the apples", answer:16, max:20, reward:6 },
{ id:16, type:"count", question:"How many apples?", answer:17, max:20, reward:6 },
{ id:17, type:"count", question:"Count carefully!", answer:18, max:20, reward:6 },
{ id:18, type:"count", question:"Count them all!", answer:19, max:20, reward:6 },
{ id:19, type:"count", question:"How many apples are there?", answer:20, max:20, reward:6 },

/* ===== ADDITION (18) ===== */
{ id:20, type:"add", question:"1 + 1 = ?", a:1, b:1, answer:2, reward:3 },
{ id:21, type:"add", question:"2 + 1 = ?", a:2, b:1, answer:3, reward:3 },
{ id:22, type:"add", question:"2 + 2 = ?", a:2, b:2, answer:4, reward:3 },
{ id:23, type:"add", question:"3 + 2 = ?", a:3, b:2, answer:5, reward:3 },
{ id:24, type:"add", question:"3 + 3 = ?", a:3, b:3, answer:6, reward:3 },

{ id:25, type:"add", question:"4 + 3 = ?", a:4, b:3, answer:7, reward:4 },
{ id:26, type:"add", question:"4 + 4 = ?", a:4, b:4, answer:8, reward:4 },
{ id:27, type:"add", question:"5 + 4 = ?", a:5, b:4, answer:9, reward:4 },
{ id:28, type:"add", question:"5 + 5 = ?", a:5, b:5, answer:10, reward:4 },

{ id:29, type:"add", question:"6 + 5 = ?", a:6, b:5, answer:11, reward:4 },
{ id:30, type:"add", question:"6 + 6 = ?", a:6, b:6, answer:12, reward:4 },
{ id:31, type:"add", question:"7 + 6 = ?", a:7, b:6, answer:13, reward:4 },
{ id:32, type:"add", question:"7 + 7 = ?", a:7, b:7, answer:14, reward:4 },

{ id:33, type:"add", question:"8 + 7 = ?", a:8, b:7, answer:15, reward:5 },
{ id:34, type:"add", question:"8 + 8 = ?", a:8, b:8, answer:16, reward:5 },
{ id:35, type:"add", question:"9 + 8 = ?", a:9, b:8, answer:17, reward:5 },
{ id:36, type:"add", question:"9 + 9 = ?", a:9, b:9, answer:18, reward:5 },

/* ===== SUBTRACTION (12) ===== */
{ id:37, type:"sub", question:"2 − 1 = ?", a:2, b:1, answer:1, reward:3 },
{ id:38, type:"sub", question:"3 − 1 = ?", a:3, b:1, answer:2, reward:3 },
{ id:39, type:"sub", question:"4 − 2 = ?", a:4, b:2, answer:2, reward:3 },
{ id:40, type:"sub", question:"5 − 2 = ?", a:5, b:2, answer:3, reward:3 },
{ id:41, type:"sub", question:"6 − 3 = ?", a:6, b:3, answer:3, reward:3 },

{ id:42, type:"sub", question:"7 − 3 = ?", a:7, b:3, answer:4, reward:4 },
{ id:43, type:"sub", question:"8 − 4 = ?", a:8, b:4, answer:4, reward:4 },
{ id:44, type:"sub", question:"9 − 5 = ?", a:9, b:5, answer:4, reward:4 },
{ id:45, type:"sub", question:"10 − 6 = ?", a:10, b:6, answer:4, reward:4 },

{ id:46, type:"sub", question:"12 − 5 = ?", a:12, b:5, answer:7, reward:5 },
{ id:47, type:"sub", question:"14 − 6 = ?", a:14, b:6, answer:8, reward:5 },
{ id:48, type:"sub", question:"15 − 7 = ?", a:15, b:7, answer:8, reward:5 },
{ id:49, type:"sub", question:"18 − 9 = ?", a:18, b:9, answer:9, reward:5 },
{ id:50, type:"sub", question:"20 − 10 = ?", a:20, b:10, answer:10, reward:6 }

];
const q = document.getElementById("question");
const mani = document.getElementById("manipulatives");
const zone = document.getElementById("answerZone");
const stickerEl = document.getElementById("stickers");

let target = 0;
let count = 0;

stickerEl.textContent = state.stickers;

/* -------------------------
   GAME LOOP
-------------------------- */
function generateChallenge() {
  mani.innerHTML = "";
  zone.textContent = "Drop apples here 🍎";
  zone.style.background = "";
  count = 0;

  const max = Math.min(20, 4 + state.level * 2);
  target = Math.floor(Math.random() * max) + 1;

  q.textContent = `Count the apples`;

  for (let i = 0; i < target; i++) {
    const el = document.createElement("div");
    el.className = "item";
    el.textContent = "🍎";
    el.draggable = true;

    el.ondragstart = e => {
      e.dataTransfer.setData("text/plain", "apple");
      el.dataset.used = "false";
    };

    mani.appendChild(el);
  }
}

/* -------------------------
   DRAG & DROP
-------------------------- */
zone.ondragover = e => e.preventDefault();

zone.ondrop = e => {
  const dragged = document.querySelector(".item:not([data-used='true'])");
  if (!dragged) return;

  dragged.dataset.used = "true";
  dragged.style.opacity = "0.3";
  count++;
  zone.textContent = count;
};

/* -------------------------
   CHECK ANSWER
-------------------------- */
function submitAnswer() {
  state.total++;

  if (count === target) {
    state.correct++;
    state.stickers++;
    reward(state.level);
    zone.style.background = "#c8f7c5";
  } else {
    zone.style.background = "#f8d7da";
    speak("Try again!");
  }

  if (state.correct / Math.max(1, state.total) > 0.75 && state.level < 10) {
    state.level++;
  }

  localStorage.setItem("mathGarden", JSON.stringify(state));
  stickerEl.textContent = state.stickers;

  setTimeout(generateChallenge, 1200);
}

/* -------------------------
   REWARD SYSTEM
-------------------------- */
function reward(power) {
  for (let i = 0; i < power * 6; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},80%,60%)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1400);
  }
  speak("Great job!");
}

/* -------------------------
   VOICE
-------------------------- */
function speak(text) {
  if (!("speechSynthesis" in window)) return;

  const voices = speechSynthesis.getVoices();

  // Prefer friendly, natural English voices
  const preferred = voices.find(v =>
    v.lang.startsWith("en") &&
    !v.name.toLowerCase().includes("google") &&
    !v.name.toLowerCase().includes("robot")
  ) || voices.find(v => v.lang.startsWith("en"));

  const u = new SpeechSynthesisUtterance(text);
  if (preferred) u.voice = preferred;

  u.rate = 0.85;   // slower = calmer
  u.pitch = 1.1;   // gentle, not squeaky
  u.volume = 1.0;

  speechSynthesis.cancel(); // prevent stacking
  speechSynthesis.speak(u);
}

/* -------------------------
   START
-------------------------- */
generateChallenge();
</script>
</body>
</html>
