<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weather Wizard v2.0 – Kindergarten Science Lab</title>
<style>
  html,body{
    height:100%;
    margin:0;
    font-family:"Comic Sans MS",sans-serif;
    background:#87ceeb;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .container{
    width:100%;
    max-width:560px;
    background:#fff8e1;
    border-radius:30px;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
    padding:24px;
    text-align:center;
  }
  h1{margin:0;color:#05668d;text-shadow:2px 2px 0 #fff;font-size:34px;}
  #scene{
    position:relative;
    width:100%;
    height:360px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:inset 0 -8px 20px rgba(0,0,0,0.2);
    transition:background 1.5s ease;
  }
  .ground{
    position:absolute;left:0;right:0;bottom:0;height:100px;
    background:linear-gradient(180deg,#4caf50 0%,#2e7d32 100%);
    border-top-left-radius:100px 40px;border-top-right-radius:100px 40px;
  }

  /* dynamic skies */
  .sky-sun{background:linear-gradient(180deg,#ffe066 0%,#ff9800 100%);}
  .sky-rain{background:linear-gradient(180deg,#5f7ea6 0%,#375c84 100%);}
  .sky-snow{background:linear-gradient(180deg,#e6f9ff 0%,#bde0fe 100%);}
  .sky-wind{background:linear-gradient(180deg,#a6f0ff 0%,#3dc8ff 100%);}
  .sky-cloudy{background:linear-gradient(180deg,#d9d9d9 0%,#b3b3b3 100%);}
  .sky-storm{background:linear-gradient(180deg,#333 0%,#000 100%);}
  .sky-rainbow{background:linear-gradient(180deg,#8ecae6 0%,#219ebc 100%);}
  .sky-fog{background:linear-gradient(180deg,#cfd8dc 0%,#90a4ae 100%);}
  .sky-night{background:linear-gradient(180deg,#001d3d 0%,#000 100%);}

  /* elements */
  .sun{
    position:absolute;top:40px;left:50%;
    width:140px;height:140px;margin-left:-70px;
    border-radius:50%;background:radial-gradient(circle,#fff9b1 0%,#ffd34d 60%,#ff9900 100%);
    box-shadow:0 0 40px rgba(255,200,50,0.8);
    animation:spin 18s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .cloud{
    position:absolute;width:100px;height:60px;background:#fff;border-radius:50%;
    box-shadow:-30px 10px 0 #fff,30px 10px 0 #fff;border:2px solid #ccc;
    animation:float 6s ease-in-out infinite alternate;
  }
  @keyframes float{to{transform:translateY(20px);}}
  .raindrop{
    position:absolute;width:10px;height:25px;background:#5cc0ff;border-radius:5px;
    animation:fall linear infinite;
  }
  @keyframes fall{to{transform:translateY(400px);opacity:0;}}
  .snow{
    position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;
    animation:snowFall linear infinite;
  }
  @keyframes snowFall{to{transform:translateY(400px) rotate(360deg);}}
  .gust{
    position:absolute;height:14px;border-radius:20px;
    background:rgba(255,255,255,0.7);
    animation:gustMove 3s linear infinite;
  }
  @keyframes gustMove{from{left:-300px;opacity:.8;}to{left:600px;opacity:0;}}
  .lightning{position:absolute;width:10px;height:60px;background:yellow;
    transform:skewX(-20deg);box-shadow:0 0 20px yellow;animation:flash 1s infinite;}
  @keyframes flash{0%,100%{opacity:0;}50%{opacity:1;}}
  .rainbow{
    position:absolute;bottom:100px;left:50%;
    width:340px;height:180px;margin-left:-170px;
    border-radius:170px 170px 0 0;
    background:conic-gradient(red,orange,yellow,green,blue,indigo,violet);
    border:4px solid #fff;opacity:.9;
  }
  .fog{
    position:absolute;left:0;right:0;height:60px;background:rgba(255,255,255,0.5);
    animation:float 5s ease-in-out infinite alternate;
  }
  .star{
    position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;
    animation:twinkle 2s infinite alternate;
  }
  @keyframes twinkle{to{opacity:.3;}}
  .moon{
    position:absolute;top:40px;left:60px;width:80px;height:80px;border-radius:50%;
    background:#f0e68c;box-shadow:0 0 20px rgba(255,255,200,.9);
  }

  /* buttons */
  #choices{
    display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:14px;
  }
  .weatherBtn{
    width:90px;height:90px;border:none;border-radius:18px;font-size:40px;
    cursor:pointer;transition:transform .2s,box-shadow .2s;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
  }
  .weatherBtn:active{transform:scale(.95);}
  .btn-sun{background:#ffeb3b;}
  .btn-rain{background:#42a5f5;color:#fff;}
  .btn-snow{background:#bbdefb;}
  .btn-wind{background:#80deea;}
  .btn-cloudy{background:#e0e0e0;}
  .btn-storm{background:#616161;color:#fff;}
  .btn-rainbow{background:#ff80ab;color:#fff;}
  .btn-fog{background:#b0bec5;}
  .btn-night{background:#1a237e;color:#fff;}

  #message{font-size:22px;font-weight:bold;margin:10px 0;min-height:28px;color:#333;}
  #fact{font-size:18px;color:#444;min-height:20px;}
  #soundToggle{
    margin-top:10px;padding:12px 20px;border:none;border-radius:12px;
    background:#ffb703;font-weight:bold;font-size:18px;cursor:pointer;
  }
  @media(max-width:600px){
    .weatherBtn{width:70px;height:70px;font-size:30px;}
    #scene{height:300px;}
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌦️ Weather Wizard</h1>
  <div id="scene" class="sky-sun"><div class="ground"></div></div>
  <div id="message">Tap a button to change the weather!</div>
  <div id="fact"></div>
  <div id="choices">
    <button class="weatherBtn btn-sun" data-weather="sun">☀️</button>
    <button class="weatherBtn btn-rain" data-weather="rain">🌧️</button>
    <button class="weatherBtn btn-snow" data-weather="snow">❄️</button>
    <button class="weatherBtn btn-wind" data-weather="wind">💨</button>
    <button class="weatherBtn btn-cloudy" data-weather="cloudy">☁️</button>
    <button class="weatherBtn btn-storm" data-weather="storm">⛈️</button>
    <button class="weatherBtn btn-rainbow" data-weather="rainbow">🌈</button>
    <button class="weatherBtn btn-fog" data-weather="fog">🌫️</button>
    <button class="weatherBtn btn-night" data-weather="night">🌙</button>
  </div>
  <button id="soundToggle">🔊 Sound: On</button>
</div>

<!-- sounds -->
<audio id="snd-sun" src="https://actions.google.com/sounds/v1/ambiences/birds_in_forest.ogg" preload="auto"></audio>
<audio id="snd-rain" src="https://actions.google.com/sounds/v1/weather/rain.ogg" preload="auto" loop></audio>
<audio id="snd-snow" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg" preload="auto"></audio>
<audio id="snd-wind" src="https://actions.google.com/sounds/v1/weather/wind.ogg" preload="auto" loop></audio>
<audio id="snd-cloudy" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" preload="auto"></audio>
<audio id="snd-storm" src="https://actions.google.com/sounds/v1/weather/thunder_crack.ogg" preload="auto"></audio>
<audio id="snd-rainbow" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
<audio id="snd-fog" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
<audio id="snd-night" src="https://actions.google.com/sounds/v1/ambiences/night_insects.ogg" preload="auto" loop></audio>

<script>
const scene=document.getElementById("scene");
const msg=document.getElementById("message");
const factBox=document.getElementById("fact");
const buttons=document.querySelectorAll(".weatherBtn");
const toggleBtn=document.getElementById("soundToggle");
const weathers=["sun","rain","snow","wind","cloudy","storm","rainbow","fog","night"];
const sounds={}; weathers.forEach(w=>sounds[w]=document.getElementById("snd-"+w));
let soundOn=true; let currentWeather="sun";

/* Fun facts */
const facts={
  sun:["The sun keeps us warm and helps plants grow!","The sun is a giant ball of gas.","We need sunlight to make vitamin D!"],
  rain:["Rain comes from clouds full of water vapor.","Raindrops fall to fill rivers and lakes.","Plants love a rainy day!"],
  snow:["Snowflakes have six sides!","No two snowflakes are exactly the same.","Snow is frozen water crystals!"],
  wind:["Wind is moving air.","Kites love windy days!","Wind helps seeds travel far away."],
  cloudy:["Clouds are made of tiny water drops.","Some clouds look like animals!","Gray clouds can mean rain is coming."],
  storm:["Lightning is a bright spark of electricity!","Thunder happens after lightning.","We stay safe indoors during storms."],
  rainbow:["Rainbows appear when sunlight shines through rain!","A rainbow has seven colors!","You can’t touch a rainbow—it’s just light!"],
  fog:["Fog is a cloud close to the ground.","Fog makes things look misty and soft.","It forms when warm air meets cool air."],
  night:["Stars twinkle because of Earth's air!","The moon doesn’t make light—it reflects the sun!","Owls come out at night."]
};

/* clean scene */
function clearScene(){
  Array.from(scene.children).forEach(ch=>{if(!ch.classList.contains("ground"))ch.remove();});
  scene.className="";
}

/* build scene */
function renderWeather(kind){
  clearScene();
  scene.classList.add("sky-"+kind);
  if(soundOn){Object.values(sounds).forEach(s=>{s.pause();s.currentTime=0;});
    sounds[kind]?.play().catch(()=>{});}
  const el=(cls)=>{const d=document.createElement("div");d.className=cls;scene.appendChild(d);return d;}
  if(kind==="sun"){el("sun");}
  if(kind==="rain"){for(let i=0;i<25;i++){const r=el("raindrop");r.style.left=Math.random()*400+"px";r.style.animationDuration=.8+Math.random()+"s";}}
  if(kind==="snow"){for(let i=0;i<20;i++){const s=el("snow");s.style.left=Math.random()*400+"px";s.style.animationDuration=2+Math.random()*2+"s";}}
  if(kind==="wind"){for(let i=0;i<5;i++){const g=el("gust");g.style.top=60+i*40+"px";g.style.width=150+Math.random()*150+"px";g.style.animationDuration=2+Math.random()*2+"s";}}
  if(kind==="cloudy"){for(let i=0;i<3;i++){const c=el("cloud");c.style.left=60+i*120+"px";c.style.top=50+Math.random()*40+"px";}}
  if(kind==="storm"){for(let i=0;i<3;i++){const l=el("lightning");l.style.left=80+i*100+"px";}}
  if(kind==="rainbow"){el("rainbow");}
  if(kind==="fog"){for(let i=0;i<4;i++){const f=el("fog");f.style.top=40+i*60+"px";}}
  if(kind==="night"){for(let i=0;i<35;i++){const st=el("star");st.style.left=Math.random()*400+"px";st.style.top=Math.random()*220+"px";}el("moon");}
}

/* narration + fact */
function speak(text){if(!soundOn)return; const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.9;u.pitch=1.1;speechSynthesis.cancel();speechSynthesis.speak(u);}
function showFact(kind){
  const arr=facts[kind];factBox.textContent=arr[Math.floor(Math.random()*arr.length)];
}

/* handle click */
buttons.forEach(b=>{
  b.addEventListener("click",()=>{
    const w=b.dataset.weather;
    currentWeather=w;
    localStorage.setItem("lastWeather",w);
    renderWeather(w);
    const lines={
      sun:"☀️ It’s sunny and bright!",
      rain:"🌧 Raindrops falling down!",
      snow:"❄️ Look, it’s snowing!",
      wind:"💨 The wind is blowing!",
      cloudy:"☁️ Clouds are covering the sky!",
      storm:"⛈ Thunder and lightning!",
      rainbow:"🌈 A rainbow shines bright!",
      fog:"🌫 Everything looks misty!",
      night:"🌙 Stars sparkle in the night!"
    };
    msg.textContent=lines[w];
    speak(lines[w]);
    showFact(w);
  });
});

/* toggle sound */
toggleBtn.addEventListener("click",()=>{
  soundOn=!soundOn;
  Object.values(sounds).forEach(s=>{s.pause();s.currentTime=0;});
  toggleBtn.textContent=soundOn?"🔊 Sound: On":"🔇 Sound: Off";
});

/* load last weather */
window.addEventListener("load",()=>{
  const last=localStorage.getItem("lastWeather")||"sun";
  currentWeather=last;
  renderWeather(last);
  msg.textContent="Tap a button to change the weather!";
  showFact(last);
});
</script>
</body>
</html>
