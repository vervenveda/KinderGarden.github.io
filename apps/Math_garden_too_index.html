<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Garden 🌼</title>

<style>
  body{
    margin:0;
    font-family:"Comic Sans MS","Arial Rounded MT Bold",sans-serif;
    background:linear-gradient(135deg,#c7f9cc,#b5eaea);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }
  .game{
    background:#fffef2;
    border-radius:30px;
    padding:24px;
    width:min(92vw,640px);
    box-shadow:0 15px 30px rgba(0,0,0,.2);
    text-align:center;
  }
  h1{color:#ff6b6b;margin:0;}
  #question{
    font-size:1.8rem;
    margin:16px 0;
    color:#333;
  }
  .manipulatives{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin:20px 0;
  }
  .item{
    font-size:2.5rem;
    cursor:pointer;
    transition:.2s;
  }
  .item:hover{transform:scale(1.2);}
  .answers{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin-top:20px;
  }
  button{
    font-size:1.4rem;
    padding:10px 20px;
    border:none;
    border-radius:18px;
    background:#4dabf7;
    color:white;
    cursor:pointer;
    transition:.3s;
  }
  button:hover{background:#339af0;}
  #feedback{
    font-size:1.6rem;
    margin-top:14px;
    min-height:2rem;
  }
  #progress{
    font-size:1rem;
    color:#555;
    margin-top:10px;
  }
</style>
</head>

<body>
<div class="game">
  <h1>🌸 Math Garden 🌸</h1>
  <div id="question"></div>
  <div class="manipulatives" id="manipulatives"></div>
  <div class="answers" id="answers"></div>
  <div id="feedback"></div>
  <div id="progress"></div>
</div>

<script>
/* ==========================
   CHALLENGE BANK (50)
   Numbers 1–20
========================== */
const CHALLENGES = [

/* ---------- COUNTING (20) ---------- */
{type:"count", answer:1, max:5, reward:2},
{type:"count", answer:2, max:5, reward:2},
{type:"count", answer:3, max:5, reward:2},
{type:"count", answer:4, max:5, reward:2},
{type:"count", answer:5, max:5, reward:3},

{type:"count", answer:6, max:10, reward:3},
{type:"count", answer:7, max:10, reward:3},
{type:"count", answer:8, max:10, reward:3},
{type:"count", answer:9, max:10, reward:3},
{type:"count", answer:10, max:10, reward:4},

{type:"count", answer:11, max:20, reward:4},
{type:"count", answer:12, max:20, reward:4},
{type:"count", answer:13, max:20, reward:4},
{type:"count", answer:14, max:20, reward:4},
{type:"count", answer:15, max:20, reward:4},

{type:"count", answer:16, max:20, reward:5},
{type:"count", answer:17, max:20, reward:5},
{type:"count", answer:18, max:20, reward:5},
{type:"count", answer:19, max:20, reward:5},
{type:"count", answer:20, max:20, reward:5},

/* ---------- ADDITION (18) ---------- */
{type:"add", a:1, b:1, answer:2, reward:3},
{type:"add", a:2, b:1, answer:3, reward:3},
{type:"add", a:2, b:2, answer:4, reward:3},
{type:"add", a:3, b:2, answer:5, reward:3},
{type:"add", a:3, b:3, answer:6, reward:3},

{type:"add", a:4, b:3, answer:7, reward:4},
{type:"add", a:4, b:4, answer:8, reward:4},
{type:"add", a:5, b:4, answer:9, reward:4},
{type:"add", a:5, b:5, answer:10, reward:4},

{type:"add", a:6, b:5, answer:11, reward:4},
{type:"add", a:6, b:6, answer:12, reward:4},
{type:"add", a:7, b:6, answer:13, reward:4},
{type:"add", a:7, b:7, answer:14, reward:4},

{type:"add", a:8, b:7, answer:15, reward:5},
{type:"add", a:8, b:8, answer:16, reward:5},
{type:"add", a:9, b:8, answer:17, reward:5},
{type:"add", a:9, b:9, answer:18, reward:5},
{type:"add", a:10, b:9, answer:19, reward:5},

/* ---------- SUBTRACTION (12) ---------- */
{type:"sub", a:2, b:1, answer:1, reward:3},
{type:"sub", a:3, b:1, answer:2, reward:3},
{type:"sub", a:4, b:2, answer:2, reward:3},
{type:"sub", a:5, b:2, answer:3, reward:3},
{type:"sub", a:6, b:3, answer:3, reward:3},

{type:"sub", a:7, b:3, answer:4, reward:4},
{type:"sub", a:8, b:4, answer:4, reward:4},
{type:"sub", a:9, b:5, answer:4, reward:4},
{type:"sub", a:10, b:6, answer:4, reward:4},

{type:"sub", a:12, b:5, answer:7, reward:5},
{type:"sub", a:15, b:7, answer:8, reward:5},
{type:"sub", a:18, b:9, answer:9, reward:5}
];


/* ==========================
   GAME STATE
========================== */
let index = 0;
let score = 0;

const qEl = document.getElementById("question");
const mEl = document.getElementById("manipulatives");
const aEl = document.getElementById("answers");
const fEl = document.getElementById("feedback");
const pEl = document.getElementById("progress");

/* ==========================
   FRIENDLY VOICE
========================== */
function speak(text){
  if(!speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang.startsWith("en")) || voices[0];
  const u = new SpeechSynthesisUtterance(text);
  if(voice) u.voice = voice;
  u.rate = 0.85;
  u.pitch = 1.1;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ==========================
   LOAD CHALLENGE
========================== */
function loadChallenge(){
  fEl.textContent = "";
  mEl.innerHTML = "";
  aEl.innerHTML = "";

  if(index >= CHALLENGES.length){
    qEl.textContent = "🎉 You finished Math Garden!";
    speak("Great job! You finished all the challenges!");
    return;
  }

  const c = CHALLENGES[index];
  pEl.textContent = `Question ${index+1} of ${CHALLENGES.length}`;

  if(c.type === "count"){
    qEl.textContent = "🍎 Count the apples!";
    speak("Count the apples.");
    for(let i=0;i<c.answer;i++){
      const d=document.createElement("div");
      d.className="item";
      d.textContent="🍎";
      mEl.appendChild(d);
    }
    generateAnswers(c.answer);
  }

  if(c.type === "add"){
    qEl.textContent = `${c.a} + ${c.b} = ?`;
    speak(`${c.a} plus ${c.b}`);
    showBlocks(c.a,"🟦");
    showBlocks(c.b,"🟩");
    generateAnswers(c.answer);
  }

  if(c.type === "sub"){
    qEl.textContent = `${c.a} − ${c.b} = ?`;
    speak(`${c.a} minus ${c.b}`);
    showBlocks(c.a,"🟦");
    generateAnswers(c.answer);
  }
}

/* ==========================
   MANIPULATIVES
========================== */
function showBlocks(n,emoji){
  for(let i=0;i<n;i++){
    const d=document.createElement("div");
    d.className="item";
    d.textContent=emoji;
    mEl.appendChild(d);
  }
}

/* ==========================
   ANSWERS
========================== */
function generateAnswers(correct){
  const set = new Set([correct]);
  while(set.size<4){
    set.add(Math.max(0,correct + Math.floor(Math.random()*7)-3));
  }
  [...set].sort(()=>Math.random()-.5).forEach(v=>{
    const b=document.createElement("button");
    b.textContent=v;
    b.onclick=()=>check(v,correct);
    aEl.appendChild(b);
  });
}

/* ==========================
   CHECK ANSWER
========================== */
function check(val,correct){
  if(val===correct){
    score++;
    fEl.textContent="🌟 Great job!";
    speak("Great job!");
    index++;
    setTimeout(loadChallenge,1200);
  }else{
    fEl.textContent="💛 Try again!";
    speak("Try again.");
  }
}

/* ==========================
   START GAME
========================== */
speechSynthesis.onvoiceschanged = loadChallenge;
loadChallenge();
</script>
</body>
</html>
